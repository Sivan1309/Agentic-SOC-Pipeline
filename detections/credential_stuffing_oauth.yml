title: Credential Stuffing Detection via High Volume Failed Logins
id: c9c19cc2-3096-47d0-a1f9-66758e661fe2
status: experimental
description: |
    Detects potential credential stuffing attacks by identifying high-volume failed login attempts,
    multiple username attempts from a single IP, and automated user-agent patterns.
author: Sivaram
date: 2026-03-17
references:
    - https://attack.mitre.org/techniques/T1110/004/
tags:
    - attack.credential_access
    - attack.t1110.004

logsource:
    category: webserver
    product: nginx

detection:

    selection_login_endpoint:
        request_method: POST
        url|contains:
            - /login
            - /auth
            - /oauth/token
            - /api/v1/auth


    selection_failed_auth:
        status:
            - 401
            - 403

    selection_suspicious_ua:
        useragent|contains:
            - python-requests
            - curl
            - wget
            - scrapy
            - httpclient
            - libwww

    filter_internal_ips:
        src_ip|startswith:
            - 10.
            - 192.168.
            - 172.16.

    condition: ((selection_login_endpoint and selection_failed_auth) or (selection_login_endpoint and selection_suspicious_ua)) and not filter_internal_ips

fields:
    - src_ip
    - username
    - useragent
    - status
    - url

falsepositives:
    - Load testing tools generating authentication traffic
    - Misconfigured applications retrying authentication
    - Internal vulnerability scans

level: high
